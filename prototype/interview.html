<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YUDHA - Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#013192;
  --cream:#FFF6E9;
  --surface:#F8F5EE;
  --teal:#00889E;
  --gold:#FFAB5B;
  --text-strong:#132547;
  --text-muted:#5E6D86;
  --white:#FFFFFF;
  --danger:#DF3E4D;
}
html,body{height:100%;background:#000;}
#app{
  max-width:430px;
  margin:0 auto;
  height:100vh;
  height:100svh;
  background:var(--surface);
  display:flex;
  flex-direction:column;
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
}
.appbar{
  background:var(--navy);
  color:var(--white);
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.appbar-side{
  min-width:64px;
  display:flex;
  justify-content:flex-start;
}
.appbar-side.right{justify-content:flex-end;}
.back-btn,.done-btn{
  border:none;
  background:transparent;
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.done-btn{
  border:1px solid rgba(223,62,77,0.7);
  color:#FF8B96;
  border-radius:999px;
  padding:6px 12px;
}
.appbar-title{
  text-align:center;
}
.appbar-main{
  font-family:'Orbitron',sans-serif;
  font-size:15px;
  font-weight:800;
  letter-spacing:1.3px;
}
.appbar-sub{
  font-size:10px;
  font-weight:600;
  opacity:0.8;
  margin-top:2px;
  letter-spacing:0.8px;
}
.content{
  flex:1;
  overflow-y:auto;
  padding:16px;
}
.hero{
  background:var(--navy);
  border-radius:20px;
  padding:16px;
  box-shadow:0 8px 16px rgba(1,49,146,0.2);
}
.hero-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.hero-name{
  color:var(--white);
  font-size:14px;
  font-weight:700;
}
.hero-role{
  color:rgba(255,255,255,0.75);
  font-size:11px;
  margin-top:2px;
}
.hero-meta{
  text-align:right;
  color:rgba(255,255,255,0.75);
  font-size:10px;
  font-weight:600;
}
.hero-time{
  color:var(--gold);
  font-family:'Orbitron',sans-serif;
  font-size:13px;
  font-weight:700;
  margin-top:3px;
}
.hero-card{
  border-radius:14px;
  background:#1E3A8A;
  padding:14px;
}
.hero-card.alt{background:#2563EB;}
.hero-label{
  color:rgba(255,255,255,0.7);
  font-family:'Orbitron',sans-serif;
  font-size:10px;
  font-weight:700;
  letter-spacing:1.1px;
}
.hero-text{
  margin-top:8px;
  color:var(--white);
  font-size:14px;
  line-height:1.45;
  font-weight:500;
}
.chat-list{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-bottom:16px;
}
.chat-row{
  display:flex;
  align-items:flex-end;
  gap:8px;
}
.chat-row.user{justify-content:flex-end;}
.bubble{
  max-width:80%;
  border-radius:16px;
  padding:12px;
  font-size:14px;
  line-height:1.4;
  font-weight:500;
}
.bubble.bot{
  background:var(--white);
  color:var(--text-strong);
  border-bottom-left-radius:4px;
  box-shadow:0 3px 10px rgba(1,49,146,0.08);
}
.bubble.user{
  background:var(--navy);
  color:var(--white);
  border-bottom-right-radius:4px;
}
.bubble.typing{
  color:var(--text-muted);
  letter-spacing:4px;
  font-weight:700;
}
.time{
  margin-top:5px;
  font-size:10px;
  font-weight:600;
  opacity:0.7;
}
.recorder{
  background:var(--white);
  border-top-left-radius:24px;
  border-top-right-radius:24px;
  padding:14px 16px 16px;
  box-shadow:0 -8px 20px rgba(1,49,146,0.12);
  flex-shrink:0;
}
.indicator{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  font-size:12px;
  font-weight:700;
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--teal);
}
.controls{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.side-action{
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid rgba(1,49,146,0.15);
  background:#F5F7FC;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  justify-content:center;
}
.main-action{
  width:72px;
  height:72px;
  border-radius:50%;
  border:none;
  background:var(--white);
  box-shadow:0 0 0 3px rgba(255,171,91,0.45),0 8px 18px rgba(255,171,91,0.3);
  color:var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.main-action.stop{
  color:var(--danger);
  box-shadow:0 0 0 3px rgba(223,62,77,0.3);
}
.main-action.disabled{
  color:var(--text-muted);
  box-shadow:0 0 0 2px rgba(1,49,146,0.12);
  cursor:not-allowed;
}
.subtitle{
  margin-top:10px;
  text-align:center;
  color:rgba(94,109,134,0.85);
  font-size:11px;
  font-weight:600;
}
.bottom-nav{
  background:#fff;
  border-top:1px solid rgba(1,49,146,0.08);
  box-shadow:0 -6px 20px rgba(1,49,146,0.08);
  padding:8px 12px 6px;
  display:flex;
  flex-shrink:0;
}
.nav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:pointer;
  background:none;
  border:none;
}
.nav-icon-wrap{
  width:44px;
  height:44px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.2s,box-shadow 0.2s;
  color:var(--text-muted);
}
.nav-item.active .nav-icon-wrap{
  background:var(--navy);
  color:var(--cream);
  box-shadow:0 4px 10px rgba(1,49,146,0.3);
}
.nav-label{
  font-family:'DM Sans',sans-serif;
  font-size:11px;
  font-weight:500;
  color:var(--text-muted);
  line-height:1;
}
.nav-item.active .nav-label{
  color:var(--navy);
  font-weight:700;
}
.icon-16{width:16px;height:16px;}
.icon-20{width:20px;height:20px;}
.icon-28{width:28px;height:28px;}
.icon-22{width:22px;height:22px;}
</style>
</head>
<body>
<div id="app">
  <header class="appbar">
    <div class="appbar-side">
      <button class="back-btn" onclick="goToPractice()" aria-label="Kembali ke Practice">
        <svg class="icon-20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="appbar-title">
      <div class="appbar-main">WAWANCARA</div>
      <div class="appbar-sub">BUMN - Sesi 1</div>
    </div>
    <div class="appbar-side right">
      <button class="done-btn" onclick="goToPractice()">Selesai</button>
    </div>
  </header>

  <main class="content" id="content"></main>

  <section class="recorder" id="recorder"></section>

  <nav class="bottom-nav">
    <button class="nav-item" type="button" onclick="goToTab('lobby')">
      <div class="nav-icon-wrap">
        <svg class="icon-22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 10.5L12 4L20 10.5V19C20 20.1 19.1 21 18 21H6C4.9 21 4 20.1 4 19V10.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M9 21V14H15V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="nav-label">Lobby</span>
    </button>
    <button class="nav-item" type="button" onclick="goToTab('pvp')">
      <div class="nav-icon-wrap">
        <svg class="icon-22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3L20 7V12C20 16.4 16.6 20.5 12 22C7.4 20.5 4 16.4 4 12V7L12 3Z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="nav-label">PvP</span>
    </button>
    <button class="nav-item" type="button" onclick="goToTab('rank')">
      <div class="nav-icon-wrap">
        <svg class="icon-22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 19H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M7 16V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 16V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M17 16V12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="nav-label">Rank</span>
    </button>
    <button class="nav-item active" type="button" onclick="goToTab('practice')">
      <div class="nav-icon-wrap">
        <svg class="icon-22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="5" y="4" width="14" height="17" rx="2.4" stroke="currentColor" stroke-width="1.8"/>
          <path d="M9 9H15M9 13H15M9 17H13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="nav-label">Practice</span>
    </button>
    <button class="nav-item" type="button" onclick="goToTab('profile')">
      <div class="nav-icon-wrap">
        <svg class="icon-22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.8"/>
          <path d="M5 20C5 16.7 7.7 14 11 14H13C16.3 14 19 16.7 19 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="nav-label">Profile</span>
    </button>
  </nav>
</div>

<script>
const InterviewState = {
  READY: 'ready',
  RECORDING: 'recording',
  PROCESSING: 'processing'
};

const state = {
  mode: InterviewState.READY,
  currentQuestion: 'Ceritakan pengalaman kamu saat menghadapi konflik dengan rekan kerja. Bagaimana kamu menyelesaikannya?',
  answerPreview: 'Waktu itu saya pernah berbeda pendapat dengan rekan soal prioritas proyek...',
  answerFull: 'Waktu itu saya pernah berbeda pendapat dengan rekan soal prioritas proyek. Saya memilih mengajak diskusi langsung, mendengarkan perspektifnya, lalu mencari solusi bersama yang adil untuk semua pihak.',
  messages: [
    { text: 'Selamat datang. Pertama, ceritakan sedikit tentang dirimu dan motivasi melamar BUMN.', isUser: false, time: '07:42' },
    { text: 'Saya Yudha, lulusan Teknik Informatika. Tertarik BUMN karena ingin berkontribusi pada pelayanan publik secara nyata.', isUser: true, time: '07:43' }
  ]
};

function goToPractice() {
  window.location.href = 'index.html?skipIntro=1&tab=practice';
}

function goToTab(tab) {
  window.location.href = 'index.html?skipIntro=1&tab=' + tab;
}

function startRecording() {
  state.mode = InterviewState.RECORDING;
  render();
  scrollBottom();
}

function stopAndSend() {
  state.mode = InterviewState.PROCESSING;
  render();
  scrollBottom();

  setTimeout(function() {
    state.messages.push({ text: state.answerFull, isUser: true, time: '07:48' });
    state.messages.push({ text: 'Menarik. Lalu bagaimana kamu memastikan solusi tersebut bisa diterima oleh seluruh anggota tim proyek?', isUser: false, time: '07:49' });
    state.mode = InterviewState.READY;
    render();
    scrollBottom();
  }, 4000);
}

function renderHero() {
  const isAnswer = state.mode === InterviewState.PROCESSING;
  const label = isAnswer ? 'JAWABAN KAMU' : 'PERTANYAAN SAAT INI';
  const text = isAnswer ? state.answerFull : state.currentQuestion;
  const cardClass = isAnswer ? 'hero-card' : 'hero-card alt';

  return `
    <section class="hero">
      <div class="hero-head">
        <div>
          <div class="hero-name">Pewawancara AI</div>
          <div class="hero-role">HR Simulator - BUMN</div>
        </div>
        <div class="hero-meta">
          <div>Pertanyaan 2 / 5</div>
          <div class="hero-time">01:24</div>
        </div>
      </div>
      <div class="${cardClass}">
        <div class="hero-label">${label}</div>
        <div class="hero-text">${text}</div>
      </div>
    </section>
  `;
}

function renderChat() {
  let html = '<section class="chat-list" id="chatList">';

  state.messages.forEach(function(message) {
    const rowClass = message.isUser ? 'chat-row user' : 'chat-row';
    const bubbleClass = message.isUser ? 'bubble user' : 'bubble bot';
    html += `
      <div class="${rowClass}">
        <div class="${bubbleClass}">
          <div>${message.text}</div>
          ${message.time ? `<div class="time">${message.time}</div>` : ''}
        </div>
      </div>
    `;
  });

  if (state.mode === InterviewState.RECORDING) {
    html += `
      <div class="chat-row user">
        <div class="bubble user">
          <div>${state.answerPreview}</div>
        </div>
      </div>
    `;
  }

  if (state.mode === InterviewState.PROCESSING) {
    html += `
      <div class="chat-row">
        <div class="bubble bot typing">
          <div>...</div>
        </div>
      </div>
    `;
  }

  html += '</section>';
  return html;
}

function renderRecorder() {
  const recorder = document.getElementById('recorder');

  if (state.mode === InterviewState.READY) {
    recorder.innerHTML = `
      <div class="indicator"><span class="dot"></span><span style="color:var(--teal)">Siap merekam</span></div>
      <div class="controls">
        <button class="side-action" type="button" aria-label="Catatan">
          <svg class="icon-20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 5H16M8 9H16M8 13H13M6 3H18C19.1 3 20 3.9 20 5V19C20 20.1 19.1 21 18 21H6C4.9 21 4 20.1 4 19V5C4 3.9 4.9 3 6 3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="main-action" type="button" onclick="startRecording()" aria-label="Mulai rekam">
          <svg class="icon-28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 4C10.3 4 9 5.3 9 7V12C9 13.7 10.3 15 12 15C13.7 15 15 13.7 15 12V7C15 5.3 13.7 4 12 4Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            <path d="M6 11.5C6 14.8 8.7 17.5 12 17.5C13.2 17.5 14.4 17.1 15.3 16.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            <path d="M12 17.5V20" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            <path d="M4.5 4.5L19.5 19.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="side-action" type="button" aria-label="Waktu">
          <svg class="icon-20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 8V12L14.8 13.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="subtitle">Tekan untuk berbicara</div>
    `;
    return;
  }

  if (state.mode === InterviewState.RECORDING) {
    recorder.innerHTML = `
      <div class="indicator"><span class="dot" style="background:var(--danger)"></span><span style="color:var(--danger)">Merekam...</span></div>
      <div class="controls">
        <button class="side-action" type="button" aria-label="Catatan">
          <svg class="icon-20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 5H16M8 9H16M8 13H13M6 3H18C19.1 3 20 3.9 20 5V19C20 20.1 19.1 21 18 21H6C4.9 21 4 20.1 4 19V5C4 3.9 4.9 3 6 3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="main-action stop" type="button" onclick="stopAndSend()" aria-label="Stop rekam">
          <svg class="icon-28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="7.5" y="7.5" width="9" height="9" rx="1.8" fill="currentColor"/>
          </svg>
        </button>
        <button class="side-action" type="button" onclick="stopAndSend()" aria-label="Kirim jawaban">
          <svg class="icon-20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 5L16 12L8 19" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="subtitle">Ketuk untuk berhenti dan kirim jawaban</div>
    `;
    return;
  }

  recorder.innerHTML = `
    <div class="indicator"><span class="dot" style="background:var(--text-muted)"></span><span style="color:var(--text-muted)">Pewawancara sedang merespons</span></div>
    <div class="controls">
      <button class="side-action" type="button" disabled aria-label="Catatan nonaktif">
        <svg class="icon-20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M8 5H16M8 9H16M8 13H13M6 3H18C19.1 3 20 3.9 20 5V19C20 20.1 19.1 21 18 21H6C4.9 21 4 20.1 4 19V5C4 3.9 4.9 3 6 3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="main-action disabled" type="button" disabled aria-label="Menunggu jawaban">
        <svg class="icon-16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="5" cy="12" r="2" fill="currentColor"/>
          <circle cx="12" cy="12" r="2" fill="currentColor"/>
          <circle cx="19" cy="12" r="2" fill="currentColor"/>
        </svg>
      </button>
      <button class="side-action" type="button" disabled aria-label="Kirim nonaktif">
        <svg class="icon-20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M8 5L16 12L8 19" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="subtitle">Tunggu pewawancara selesai berbicara</div>
  `;
}

function render() {
  const content = document.getElementById('content');
  content.innerHTML = renderHero() + renderChat();
  renderRecorder();
}

function scrollBottom() {
  requestAnimationFrame(function() {
    const content = document.getElementById('content');
    content.scrollTop = content.scrollHeight;
  });
}

render();
</script>
</body>
</html>
